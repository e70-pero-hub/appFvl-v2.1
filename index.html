<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuelTrack Pro V2 | Mobilna Aplikacija</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body class="dark-theme">
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h1>FuelTrack <span class="accent-text">Mobile</span></h1>
            <p>Mobilni sistem za upravljanje gorivom</p>
            <div id="login-error" class="login-error">Pogrešno korisničko ime ili lozinka</div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label>Korisničko Ime</label>
                    <input type="text" id="username" placeholder="korisnik" required>
                </div>
                <div class="form-group">
                    <label>Lozinka</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Prijavi se</button>
            </form>
            <div style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-dim);">
                Probajte:<br>
                Admin: <b>admin</b> / <b>admin123</b><br>
                Vozač: <b>operater</b> / <b>gas123</b>
            </div>
        </div>
    </div>

    <!-- Glavna Aplikacija -->
    <div id="main-app">
        <!-- Top App Bar -->
        <header class="top-app-bar">
            <div class="brand">
                <i class="fas fa-gas-pump accent-icon"></i>
                <span>FT <span class="accent-text">Pro</span></span>
            </div>
            <div class="top-actions">
                <div class="user-info" id="role-toggle" title="Odjavi se">
                    <div class="avatar" id="user-avatar">?</div>
                </div>
                <span id="user-name" style="display:none;"></span>
                <span id="user-role" style="display:none;"></span>
                <div id="current-date" style="display:none;"></div>
                <button id="btn-change-password" style="display:none;"></button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <h2 id="section-title" class="mobile-section-title">Nadzorna Tabla</h2>
            <div id="content-area" class="content-area">
                <div class="loading-shimmer">Učitavam...</div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <!-- Centralno FAB dugme -->
            <button id="add-fuel-btn" class="fab-btn hidden">
                <i class="fas fa-gas-pump"></i>
            </button>
            <ul class="nav-links">
                <li class="active" data-section="dashboard">
                    <i class="fas fa-home"></i>
                    <span>Početna</span>
                </li>
                <li data-section="vehicles">
                    <i class="fas fa-car-side"></i>
                    <span>Vozila</span>
                </li>
                <li data-section="fuel">
                    <i class="fas fa-gas-pump"></i>
                    <span>Gorivo</span>
                </li>
                <li data-section="employees" id="nav-users" class="hidden">
                    <i class="fas fa-users"></i>
                    <span>Korisnici</span>
                </li>
                <li data-section="reports" id="nav-reports" class="hidden">
                    <i class="fas fa-chart-bar"></i>
                    <span>Izveštaji</span>
                </li>
            </ul>
        </nav>

        <!-- Modals -->
        <div id="modal-container" class="modal-overlay hidden">
            <div class="modal-content glass bottom-sheet">
                <div class="modal-header">
                    <h2 id="modal-title">Naslov Modala</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <!-- Dugme za QR kod za točenja -->
                <button id="scan-qr-btn" class="btn btn-secondary hidden" style="margin-bottom: 1rem; width:100%;"><i class="fas fa-camera"></i> Skeniraj QR Kod Računa</button>
                <div id="qr-reader" style="width: 100%; display: none;"></div>
                
                <div id="modal-body" class="modal-body">
                    <!-- Sadržaj forme -->
                </div>
            </div>
        </div>
    </div>

    <!-- Aplikacijska logika -->
    <script src="js/api/DataManager.js" defer></script>
    <script src="js/ui/UIManager.js" defer></script>
    <script src="js/main.js" defer></script>
</body>

</html>
